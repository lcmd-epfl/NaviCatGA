# Template for a SelfiesGenAlgSolver run (SELFIES tokens - mutations always
# decode to a valid molecule, unlike raw SMILES).
# Build with: navicatGA.config.build_solver_from_yaml("templates/selfies.yaml")
#
# References below use 'module.path:attr' (resolved via importlib), or
# 'module.path:attr()' to call a zero-arg factory and use its return value.

solver:
  type: selfies

  # Required. fn(selfies_chromosome) -> float (or a tuple if using a scalarizer).
  # navicatGA bundles numbered examples, e.g. logP:
  # fitness_function: navicatGA.fitness_functions_selfies:fitness_function_selfies(1)
  fitness_function: your_project.fitness:your_fitness_function

  # Optional. Defaults to concatenate_list().
  # chromosome_to_selfies: your_project.assemblers:your_selfies_builder

  # Optional multi-objective scalarizer (needs fitness_function to return a
  # tuple). Any class with a .scalarize() method works, not just chimera.
  # scalarizer:
  #   class: chimera:Chimera
  #   kwargs:
  #     tolerances: [0.25, 0.1, 0.25]
  #     goals: [max, max, min]     # one per fitness_function output

  params:
    n_genes: 20                    # required: needs at least count_selfie_chars(starting_selfies[0])
    # starting_selfies: ["[C][O]"] # list of starting SELFIES strings; encode with selfies.encoder(smiles)
    starting_random: false         # randomize starting_selfies from alphabet_list
    # starting_stoned: false       # generate a chemical subspace from starting_selfies via STONED (needs exactly 1 starting_selfies entry, incompatible with starting_random)
    # excluded_genes: [0, 1, 2]    # gene indices to hold fixed (e.g. to freeze a starting scaffold)
    # branching: false             # add random branch tokens to the alphabet
    # variables_limits: false      # set semantic constraints on the alphabet if true
    max_counter: 10                # retries before falling back to a parent on invalid SELFIES

    # --- GA mechanics (defaults shown) ---
    pop_size: 100
    mutation_rate: 0.05
    selection_rate: 0.25
    selection_strategy: tournament  # roulette_wheel | tournament | two_by_two | random | boltzmann
    n_crossover_points: 1
    max_gen: 500
    max_conv: 100                  # generations with unchanged best fitness before stopping early
    random_state: null
    lru_cache: false               # requires fitness_function+assembler output to be hashable
    prune_duplicates: false

    # --- logging / output ---
    verbose: true
    show_stats: false
    plot_results: false
    to_stdout: true
    to_file: true
    logger_file: output.log
    logger_level: INFO
    progress_bars: false           # tqdm bar over fitness evaluations
