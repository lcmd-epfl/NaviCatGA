# Template for a SmilesGenAlgSolver run (SMILES fragments from an alphabet).
# Build with: navicatGA.config.build_solver_from_yaml("templates/smiles.yaml", alphabet_list=...)
#
# alphabet_list is intentionally NOT set here: it usually comes from a
# database/file read at runtime (see ga_flp/launcher.py for a worked
# example), so pass it as an extra kwarg to build_solver_from_yaml/build_solver
# rather than trying to express it statically in YAML.
#
# References below use 'module.path:attr' (resolved via importlib), or
# 'module.path:attr()' to call a zero-arg factory and use its return value.

solver:
  type: smiles

  # Required. fn(smiles_string) -> float (or a tuple if using a scalarizer).
  fitness_function: your_project.fitness:your_fitness_function

  # Optional. Defaults to concatenate_list() (chromosome genes joined as-is).
  # Use the '()' suffix for navicatGA's own bundled example assembler:
  # chromosome_to_smiles: navicatGA.wrappers_smiles:chromosome_to_smiles()
  # chromosome_to_smiles: your_project.assemblers:your_smiles_builder

  # Optional multi-objective scalarizer (needs fitness_function to return a
  # tuple). Any class with a .scalarize() method works, not just chimera.
  # scalarizer:
  #   class: chimera:Chimera
  #   kwargs:
  #     tolerances: [0.25, 0.1, 0.25]
  #     goals: [max, max, min]     # one per fitness_function output

  params:
    n_genes: 7                     # required: number of chromosome positions
    # starting_population: [["C"]] # list of starting chromosomes (list of lists)
    starting_random: true          # randomize starting_population from alphabet_list
    # excluded_genes: [0]          # gene indices to hold fixed (e.g. a fixed scaffold atom)
    # equivalences: [[0, 1], [2]]  # only with a multi_alphabet_list (list of per-gene alphabets)
    max_counter: 10                # retries before falling back to a parent on invalid SMILES

    # --- GA mechanics (defaults shown) ---
    pop_size: 100
    mutation_rate: 0.05
    selection_rate: 0.25
    selection_strategy: tournament  # roulette_wheel | tournament | two_by_two | random | boltzmann
    n_crossover_points: 1
    max_gen: 500
    max_conv: 100                  # generations with unchanged best fitness before stopping early
    random_state: null
    lru_cache: false               # requires fitness_function+assembler output to be hashable
    prune_duplicates: false

    # --- logging / output ---
    verbose: true
    show_stats: false
    plot_results: false
    to_stdout: true
    to_file: true
    logger_file: output.log
    logger_level: INFO
    progress_bars: false           # needs alive-progress installed
